<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Course heatmap</title>
  <desc id="desc">Activity and resource heatmap with label-based modal triggers.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#111827"/>
      <stop offset="100%" stop-color="#065f46"/>
    </linearGradient>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <rect x="80" y="80" width="1440" height="740" rx="36" fill="#0b1220" opacity="0.9"/>
  <text x="140" y="170" fill="#ffffff" font-family="Inter, Arial, sans-serif" font-size="54" font-weight="700">Course heatmap</text>
  <text x="140" y="225" fill="#a7f3d0" font-family="Inter, Arial, sans-serif" font-size="26">Clickable labels for completed, not completed, graded, and not graded users.</text>
  <g font-family="Inter, Arial, sans-serif" font-size="22">
    <rect x="140" y="300" width="1320" height="86" rx="18" fill="#14532d"/>
    <text x="180" y="354" fill="#f8fafc">Section and activity tiles</text>
    <rect x="140" y="412" width="1320" height="86" rx="18" fill="#0f766e"/>
    <text x="180" y="466" fill="#f8fafc">Engagement labels as action triggers</text>
    <rect x="140" y="524" width="1320" height="86" rx="18" fill="#1d4ed8"/>
    <text x="180" y="578" fill="#f8fafc">Student list modals via Moodle AJAX</text>
  </g>
</svg>
