  <title id="title">Not graded users modal</title>
  <desc id="desc">Not graded students modal showing enrolled students missing grades.</desc>
  <rect width="1600" height="900" fill="#1e1b4b"/>
  <rect x="240" y="120" width="1120" height="660" rx="30" fill="#ffffff"/>
