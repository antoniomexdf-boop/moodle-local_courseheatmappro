<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Engagement distribution</title>
  <desc id="desc">Engagement distribution chart and summary block.</desc>
  <rect width="1600" height="900" fill="#0f172a"/>
  <rect x="120" y="120" width="1360" height="660" rx="28" fill="#ffffff"/>
  <text x="180" y="190" fill="#0f172a" font-family="Inter, Arial, sans-serif" font-size="44" font-weight="700">Engagement distribution</text>
  <text x="180" y="240" fill="#475569" font-family="Inter, Arial, sans-serif" font-size="22">A quick visual summary of module health across the course.</text>
  <rect x="180" y="300" width="1040" height="48" rx="24" fill="#e2e8f0"/>
  <rect x="180" y="300" width="320" height="48" rx="24" fill="#22c55e"/>
  <rect x="500" y="300" width="360" height="48" fill="#2563eb"/>
  <rect x="860" y="300" width="180" height="48" fill="#f59e0b"/>
  <rect x="1040" y="300" width="100" height="48" fill="#f97316"/>
  <rect x="1140" y="300" width="80" height="48" rx="24" fill="#94a3b8"/>
  <g font-family="Inter, Arial, sans-serif" font-size="20" fill="#0f172a">
    <text x="180" y="400">High engagement</text>
    <text x="180" y="450">Medium engagement</text>
    <text x="180" y="500">Low engagement</text>
    <text x="180" y="550">No activity</text>
    <text x="180" y="600">No completion tracking</text>
  </g>
  <g font-family="Inter, Arial, sans-serif" font-size="20" font-weight="700" fill="#0f172a">
    <text x="500" y="400">60%</text>
    <text x="500" y="450">30%</text>
    <text x="500" y="500">5%</text>
    <text x="500" y="550">3%</text>
    <text x="500" y="600">2%</text>
  </g>
</svg>
