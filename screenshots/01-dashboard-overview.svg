<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Dashboard overview</title>
  <desc id="desc">Course Engagement Map Pro dashboard landing page with selectors and executive summary.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <rect x="80" y="80" width="1440" height="740" rx="36" fill="#0b1220" opacity="0.86"/>
  <text x="140" y="170" fill="#ffffff" font-family="Inter, Arial, sans-serif" font-size="54" font-weight="700">Dashboard overview</text>
  <text x="140" y="225" fill="#bfdbfe" font-family="Inter, Arial, sans-serif" font-size="26">Selectors, executive summary, engagement chart, and export access.</text>
  <g fill="#e2e8f0" font-family="Inter, Arial, sans-serif" font-size="22">
    <text x="140" y="330">Course selector</text>
    <text x="140" y="390">Period selector</text>
    <text x="140" y="450">Executive summary block</text>
    <text x="140" y="510">Engagement distribution chart</text>
    <text x="140" y="570">Heatmap sections and activity tiles</text>
    <text x="140" y="630">Export history table</text>
  </g>
  <rect x="980" y="170" width="360" height="320" rx="28" fill="#1e293b" stroke="#38bdf8" stroke-width="2"/>
  <text x="1040" y="260" fill="#f8fafc" font-family="Inter, Arial, sans-serif" font-size="40" font-weight="700">Course Engagement</text>
  <text x="1040" y="310" fill="#93c5fd" font-family="Inter, Arial, sans-serif" font-size="30">Map Pro</text>
  <text x="1040" y="390" fill="#cbd5e1" font-family="Inter, Arial, sans-serif" font-size="22">Preview placeholder for GitHub.</text>
  <text x="1040" y="430" fill="#cbd5e1" font-family="Inter, Arial, sans-serif" font-size="22">Replace with runtime capture later.</text>
</svg>
