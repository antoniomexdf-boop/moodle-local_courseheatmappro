<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Graded users modal</title>
  <desc id="desc">Graded students modal with visible grades.</desc>
  <rect width="1600" height="900" fill="#0f172a"/>
  <rect x="240" y="120" width="1120" height="660" rx="30" fill="#ffffff"/>
  <text x="300" y="200" fill="#0f172a" font-family="Inter, Arial, sans-serif" font-size="48" font-weight="700">Graded students</text>
  <text x="300" y="252" fill="#334155" font-family="Inter, Arial, sans-serif" font-size="24">Students with grade records for this activity.</text>
  <rect x="300" y="320" width="980" height="54" rx="10" fill="#dbeafe"/>
  <text x="330" y="355" fill="#0f172a" font-family="Inter, Arial, sans-serif" font-size="22">Student name | Email | Grade</text>
  <text x="330" y="430" fill="#0f172a" font-family="Inter, Arial, sans-serif" font-size="22">Grace Kim - 92%</text>
  <text x="330" y="486" fill="#0f172a" font-family="Inter, Arial, sans-serif" font-size="22">Hugo Mendez - 87%</text>
  <text x="330" y="542" fill="#0f172a" font-family="Inter, Arial, sans-serif" font-size="22">Irene Park - 95%</text>
</svg>
